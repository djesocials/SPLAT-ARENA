<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💥 SPLAT ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#04040f;font-family:'Boogaloo',cursive;}
canvas{position:absolute;top:0;left:0;display:block;touch-action:none;cursor:crosshair;}
canvas.hidden{display:none!important;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;gap:13px;z-index:20;overflow-y:auto;}
.screen.hidden{display:none!important;}
.bg-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(110px);animation:orbFloat ease-in-out infinite;}
@keyframes orbFloat{0%,100%{transform:translateY(0)scale(1);}50%{transform:translateY(-35px)scale(1.08);}}
.logo-main{font-size:clamp(54px,13vw,108px);line-height:.88;text-align:center;
  background:linear-gradient(135deg,#FF3CA0 0%,#FF9D00 50%,#00EEFF 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(255,60,160,.4));}
.logo-sub{font-size:clamp(11px,2vw,15px);letter-spacing:8px;color:rgba(255,255,255,.28);
  text-transform:uppercase;margin-top:2px;text-align:center;}
input[type=text]{padding:11px 18px;font-family:'Boogaloo',cursive;font-size:clamp(18px,3.5vw,22px);
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:14px;
  color:#fff;text-align:center;outline:none;width:100%;max-width:290px;transition:border-color .2s;}
input[type=text]:focus{border-color:rgba(255,60,160,.65);}
input[type=text]::placeholder{color:rgba(255,255,255,.2);}
.btn{padding:13px 36px;font-family:'Boogaloo',cursive;font-size:clamp(17px,3.5vw,23px);
  border:none;border-radius:16px;cursor:pointer;letter-spacing:1px;min-width:215px;
  transition:transform .08s;touch-action:manipulation;position:relative;overflow:hidden;}
.btn:active{transform:scale(.95);}
.btn-hot{background:linear-gradient(135deg,#FF3CA0,#FF6B00);color:#fff;box-shadow:0 5px 0 #7a1020,0 0 35px rgba(255,60,160,.22);}
.btn-cool{background:linear-gradient(135deg,#00EEFF,#0088FF);color:#04040f;box-shadow:0 5px 0 #004466,0 0 35px rgba(0,180,255,.18);}
.btn-bot{background:linear-gradient(135deg,#7BFF35,#00CC88);color:#04040f;box-shadow:0 5px 0 #1a6600,0 0 35px rgba(123,255,53,.2);}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);border:2px solid rgba(255,255,255,.12);box-shadow:none;}
.diff-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.diff-btn{padding:9px 20px;font-family:'Boogaloo',cursive;font-size:15px;border:2px solid rgba(255,255,255,.15);
  border-radius:10px;cursor:pointer;background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);
  transition:all .15s;touch-action:manipulation;}
.diff-btn.sel{background:rgba(123,255,53,.18);border-color:#7BFF35;color:#7BFF35;}
.code-box{font-size:clamp(38px,10vw,68px);letter-spacing:12px;color:#fff;padding:10px 24px;
  cursor:pointer;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:16px;
  text-shadow:0 0 28px rgba(255,60,160,.8),0 0 55px rgba(255,60,160,.3);}
.pslots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.pslot{width:84px;height:84px;border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;border:2px dashed rgba(255,255,255,.1);
  color:rgba(255,255,255,.2);font-size:11px;transition:all .3s;}
.pslot.on{border-style:solid;}
#hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;
  justify-content:space-between;align-items:flex-start;padding:10px 14px;pointer-events:none;}
#hud.hidden{display:none;}
.hscores{display:flex;gap:7px;flex-wrap:wrap;}
.hs{display:flex;align-items:center;gap:6px;background:rgba(4,4,15,.78);
  backdrop-filter:blur(8px);padding:5px 12px 5px 8px;border-radius:12px;
  border-left:4px solid transparent;font-size:clamp(11px,2vw,14px);}
#timer{font-size:clamp(28px,5.5vw,42px);text-shadow:0 0 18px rgba(255,255,255,.28);letter-spacing:2px;}
#timer.warn{color:#FF3CA0;animation:timerPulse .5s ease-in-out infinite alternate;}
@keyframes timerPulse{from{text-shadow:0 0 18px rgba(255,60,160,.5);}to{text-shadow:0 0 30px rgba(255,60,160,.9);}}
#fire-btn{position:absolute;bottom:22px;right:22px;width:74px;height:74px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ff6060,#c01830);
  border:3px solid rgba(255,255,255,.22);display:none;align-items:center;
  justify-content:center;font-size:26px;z-index:15;
  box-shadow:0 0 28px rgba(255,40,80,.45);pointer-events:all;touch-action:manipulation;}
#minimap-c{position:absolute;bottom:14px;left:14px;width:110px;height:74px;
  border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(4,4,20,.82);backdrop-filter:blur(6px);z-index:10;}
#minimap-c.hidden{display:none;}
.toast{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(4,4,15,.92);backdrop-filter:blur(10px);padding:7px 18px;
  border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:50;white-space:nowrap;border:1px solid rgba(255,255,255,.1);}
.toast.show{opacity:1;}
#screen-go{background:radial-gradient(ellipse at center,rgba(4,4,15,.96),rgba(0,0,5,.99));z-index:25;}
#go-winner{font-size:clamp(32px,8vw,65px);margin:4px 0;}
#go-scores{display:flex;flex-direction:column;gap:5px;align-items:center;}
.go-row{display:flex;align-items:center;gap:10px;font-size:clamp(15px,3vw,19px);}
.go-dot{width:14px;height:14px;border-radius:50%;}
#sound-toggle{position:absolute;top:14px;right:14px;width:36px;height:36px;
  border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:100;color:#fff;opacity:.4;transition:all .2s;}
#sound-toggle:hover{opacity:1;background:rgba(255,255,255,.15);}
</style>
</head>
<body>

<div id="sound-toggle" onclick="toggleMute()">🔊</div>

<div class="bg-layer">
  <div class="orb" style="width:600px;height:600px;background:#FF3CA0;opacity:.055;top:-200px;left:-150px;animation-duration:12s;"></div>
  <div class="orb" style="width:500px;height:500px;background:#00EEFF;opacity:.055;bottom:-150px;right:-100px;animation-duration:15s;animation-delay:-5s;"></div>
  <div class="orb" style="width:400px;height:400px;background:#7BFF35;opacity:.038;top:30%;right:20%;animation-duration:10s;animation-delay:-3s;"></div>
</div>
<div class="toast" id="toast"></div>

<div class="screen" id="screen-home">
  <div class="logo-main">SPLAT<br>ARENA</div>
  <div class="logo-sub">Real-time paint brawl</div>
  <input id="name-in" type="text" placeholder="Your nickname…" maxlength="12" style="margin-top:6px;">
  <button class="btn btn-bot" onclick="goBotMode()">🤖 vs Bots</button>
  <button class="btn btn-hot" onclick="hostGame()">🎮 Host Game</button>
  <button class="btn btn-cool" onclick="gotoJoin()">🔗 Join Game</button>
  <div style="font-size:11px;opacity:.2;margin-top:2px;text-align:center;line-height:1.9;">
    Move toward cursor · Click to shoot
  </div>
</div>

<div class="screen hidden" id="screen-bots">
  <div class="logo-main" style="font-size:clamp(32px,7vw,56px);">🤖 VS BOTS</div>
  <div style="font-size:16px;opacity:.55;letter-spacing:2px;">HOW MANY BOTS?</div>
  <div class="diff-row" id="bot-count-row">
    <button class="diff-btn sel" onclick="setBotCount(1)">1 Bot</button>
    <button class="diff-btn" onclick="setBotCount(2)">2 Bots</button>
    <button class="diff-btn" onclick="setBotCount(3)">3 Bots</button>
  </div>
  <div style="font-size:16px;opacity:.55;letter-spacing:2px;margin-top:4px;">DIFFICULTY</div>
  <div class="diff-row" id="diff-row">
    <button class="diff-btn" onclick="setDiff('easy')">😊 Easy</button>
    <button class="diff-btn sel" onclick="setDiff('medium')">😤 Medium</button>
    <button class="diff-btn" onclick="setDiff('hard')">💀 Hard</button>
  </div>
  <button class="btn btn-bot" onclick="startBotGame()" style="margin-top:6px;">🚀 Play!</button>
  <button class="btn btn-ghost" onclick="showScreen('screen-home')">← Back</button>
</div>

<div class="screen hidden" id="screen-join">
  <div style="font-size:22px;opacity:.65;letter-spacing:3px;">ENTER CODE</div>
  <input id="code-in" type="text" placeholder="ABCDEF" maxlength="6" style="text-transform:uppercase;letter-spacing:8px;font-size:26px;max-width:240px;">
  <button class="btn btn-cool" onclick="joinGame()">Connect →</button>
  <button class="btn btn-ghost" onclick="showScreen('screen-home')">← Back</button>
  <div id="join-msg" style="font-size:13px;opacity:.4;min-height:18px;"></div>
</div>

<div class="screen hidden" id="screen-lobby">
  <div style="font-size:12px;opacity:.32;letter-spacing:5px;text-transform:uppercase;">Room Code</div>
  <div class="code-box" id="codeDisplay" onclick="copyCode()">------</div>
  <div style="font-size:11px;opacity:.26;letter-spacing:2px;text-transform:uppercase;margin-top:-4px;">📋 tap to copy · share with friends</div>
  <div class="pslots" id="pGrid"></div>
  <div id="lobby-msg" style="font-size:15px;opacity:.52;">Waiting for players…</div>
  <button class="btn btn-hot" id="startBtn" onclick="startGame()" style="display:none;">🚀 Start!</button>
  <button class="btn btn-ghost" onclick="leaveGame()">← Leave</button>
</div>

<canvas id="canvas" class="hidden"></canvas>
<div id="hud" class="hidden">
  <div class="hscores" id="hud-scores"></div>
  <div id="timer">2:00</div>
</div>
<canvas id="minimap-c" class="hidden"></canvas>
<div id="fire-btn">🔥</div>

<div class="screen hidden" id="screen-go">
  <div style="font-size:12px;letter-spacing:7px;opacity:.42;">GAME OVER</div>
  <div id="go-winner"></div>
  <div id="go-scores"></div>
  <button class="btn btn-hot" onclick="playAgain()">🔄 Play Again</button>
  <button class="btn btn-ghost" onclick="leaveGame()">🏠 Home</button>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const WW=2400, WH=1600;
const PRAD=26, BRAD=7, BBRAD=16;
const PSPD=420; 
const GDUR=120, SHOOT_CD=290, PU_INTERVAL=6500;
const TRAIL_MAX=28;

const COLORS=['#FF3CA0','#00EEFF','#7BFF35','#FF9D00'];
const PU_TYPES=['speed','big','shield','chaos','heal'];
const PU_CLR ={speed:'#FFEE00',big:'#FF6B00',shield:'#00FFCC',chaos:'#CC00FF',heal:'#FF4466'};
const PU_ICO ={speed:'⚡',big:'💥',shield:'🛡',chaos:'🌀',heal:'❤️'};
const BOT_NAMES=['ROBO','GLITCH','AXIOM','NEXUS','DELTA','OMEGA'];

/* ═══════════════════════════════════════════════
   AUDIO ENGINE (Satisfying SFX)
═══════════════════════════════════════════════ */
let AC = null, AC_MUTE = false;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type, pitch = 1) {
  if (!AC || AC_MUTE) return;
  if (AC.state === 'suspended') AC.resume();

  const now = AC.currentTime;
  const g = AC.createGain();
  const o = AC.createOscillator();
  g.connect(AC.destination);

  if (type === 'shoot') {
    o.type = 'triangle';
    o.frequency.setValueAtTime(440 * pitch, now);
    o.frequency.exponentialRampToValueAtTime(110, now + 0.1);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    o.connect(g); o.start(); o.stop(now + 0.1);
  } 
  else if (type === 'splat') {
    o.type = 'sine';
    o.frequency.setValueAtTime(150 * pitch, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.15);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    o.connect(g); o.start(); o.stop(now + 0.15);
  }
  else if (type === 'hit') {
    o.type = 'square';
    o.frequency.setValueAtTime(80 * pitch, now);
    o.frequency.linearRampToValueAtTime(10, now + 0.2);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    o.connect(g); o.start(); o.stop(now + 0.2);
  }
  else if (type === 'powerup') {
    o.type = 'sine';
    o.frequency.setValueAtTime(500 * pitch, now);
    o.frequency.exponentialRampToValueAtTime(1000, now + 0.3);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    o.connect(g); o.start(); o.stop(now + 0.3);
  }
  else if (type === 'death') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110 * pitch, now);
    o.frequency.linearRampToValueAtTime(30, now + 0.4);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    o.connect(g); o.start(); o.stop(now + 0.4);
  }
}

function toggleMute() {
  AC_MUTE = !AC_MUTE;
  document.getElementById('sound-toggle').textContent = AC_MUTE ? '🔇' : '🔊';
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let peer=null, myId=0, isHost=false, botMode=false;
let conns=[], connMap={};
let gs=null;
let splats=[], parts=[], trails={};
let bId=0, pId=0, rafId=null, puTimer=0, netTimer=0;
let myName='PLAYER', isMobile=false;
let botCount=1, botDiff='medium';
let bots=[];   
let camX=0, camY=0;
let mouseX=0, mouseY=0, shootHeld=false, fireTouchDown=false;
const inp={angle:0, shoot:false};

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap-c');
const mmc=mm.getContext('2d');

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function showScreen(id){
  initAudio();
  ['screen-home','screen-join','screen-lobby','screen-go','screen-bots'].forEach(
    s=>document.getElementById(s).classList.toggle('hidden',s!==id));
}
function toast(msg,ms=2400){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);
}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.random()*c.length|0]).join('');}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dst2(a,b){return (a.x-b.x)**2+(a.y-b.y)**2;}
function copyCode(){navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('codeDisplay').textContent).then(()=>toast('📋 Copied!'));}

/* ═══════════════════════════════════════════════
   BOT MODE UI
═══════════════════════════════════════════════ */
function goBotMode(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  showScreen('screen-bots');
}
function setBotCount(n){
  botCount=n;
  document.querySelectorAll('#bot-count-row .diff-btn').forEach((b,i)=>b.classList.toggle('sel',i===n-1));
}
function setDiff(d){
  botDiff=d;
  document.querySelectorAll('#diff-row .diff-btn').forEach(b=>b.classList.toggle('sel',b.textContent.toLowerCase().includes(d)));
}
function startBotGame(){
  isHost=true; botMode=true; myId=0; peer=null; conns=[]; connMap={};
  gs=mkState(); gs.players[0]=mkPlayer(0,myName); gs.phase='playing'; gs.timeLeft=GDUR; gs.code='------';
  bots=[];
  for(let i=0;i<botCount;i++){
    const id=i+1;
    gs.players[id]=mkPlayer(id,BOT_NAMES[i%BOT_NAMES.length]);
    const startAngle=Math.random()*6.28;
    bots.push({id,thinkTimer:Math.random()*.5,wanderT:0,strafeDir:1,
      targetX:gs.players[id].x,targetY:gs.players[id].y,
      aimAngle:startAngle,wantShoot:false});
  }
  splats=[]; parts=[]; trails={}; bId=0; pId=0; puTimer=0; netTimer=0;
  launchGame();
}

/* ═══════════════════════════════════════════════
   PEER / HOST
═══════════════════════════════════════════════ */
function mkPeer(id){return new Promise((res,rej)=>{const p=id?new Peer(id):new Peer();p.on('open',id=>{peer=p;res(id);});p.on('error',e=>rej(e));});}

async function hostGame(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  const code=genCode(); toast('Creating room…',4000);
  try{await mkPeer('SA-'+code);}catch(e){toast('Failed — try again');return;}
  isHost=true; botMode=false; myId=0; conns=[]; connMap={};
  gs=mkState(); gs.players[0]=mkPlayer(0,myName); gs.phase='lobby'; gs.code=code;
  peer.on('connection',conn=>{conn.on('open',()=>{
    const pid=gs.players.findIndex(p=>!p);
    if(pid<0||gs.phase!=='lobby'){conn.send({t:'rej',r:gs.phase!=='lobby'?'In progress':'Room full'});conn.close();return;}
    conns.push(conn); connMap[conn.peer]=pid;
    conn.on('data',d=>onClientData(conn,d)); conn.on('close',()=>onDC(conn)); conn.on('error',()=>onDC(conn));
    conn.send({t:'assign',id:pid});
  });});
  document.getElementById('codeDisplay').textContent=code;
  updateLobby(); showScreen('screen-lobby'); toast('Room ready! Share the code 🎉');
}
function onClientData(conn,d){
  const pid=connMap[conn.peer]; if(pid==null)return;
  if(d.t==='join'){gs.players[pid]=mkPlayer(pid,(d.name||'PLAYER').toUpperCase().slice(0,12));updateLobby();bcast();}
  else if(d.t==='inp'&&gs.phase==='playing'){applyInp(pid,d.i);}
  else if(d.t==='restart'&&isHost){startGame();}
}
function onDC(conn){
  const pid=connMap[conn.peer]; if(pid==null)return;
  if(gs&&gs.players[pid])gs.players[pid]=null;
  delete connMap[conn.peer]; conns=conns.filter(c=>c!==conn);
  updateLobby(); bcast();
}
function bcast(){const m={t:'gs',gs,splats:splats.slice(-200)};conns.forEach(c=>{try{c.send(m);}catch(e){}});}

function gotoJoin(){
  myName=(document.getElementById('name-in').value.trim().toUpperCase()||'PLAYER').slice(0,12);
  showScreen('screen-join'); setTimeout(()=>document.getElementById('code-in').focus(),100);
}
async function joinGame(){
  const code=document.getElementById('code-in').value.trim().toUpperCase();
  if(code.length<4){toast('Enter a valid code!');return;}
  const msg=document.getElementById('join-msg'); msg.textContent='Connecting…';
  try{await mkPeer(null);}catch(e){msg.textContent='Failed to connect';return;}
  isHost=false; botMode=false;
  const conn=peer.connect('SA-'+code,{reliable:true});
  conn.on('open',()=>{conn.send({t:'join',name:myName});conns=[conn];conn.on('data',d=>onHostData(d));conn.on('close',()=>{toast('Disconnected',3000);leaveGame();});conn.on('error',()=>{toast('Error',3000);leaveGame();});msg.textContent='Connected!';});
  conn.on('error',()=>{msg.textContent='Could not connect — check the code';if(peer){peer.destroy();peer=null;}});
}
function onHostData(d){
  if(d.t==='rej'){toast('Cannot join: '+d.r,3000);leaveGame();return;}
  if(d.t==='assign'){myId=d.id;}
  if(d.t==='gs'){
    const was=gs&&gs.phase==='playing'; gs=d.gs; if(d.splats)splats=d.splats;
    if(gs.phase==='lobby'){document.getElementById('codeDisplay').textContent=gs.code||'------';updateLobby();showScreen('screen-lobby');}
    else if(gs.phase==='playing'&&!was){launchGame();}
    else if(gs.phase==='gameover'){showGO();}
  }
}

function updateLobby(){
  const g=document.getElementById('pGrid'); g.innerHTML='';
  for(let i=0;i<4;i++){
    const p=gs.players[i]; const el=document.createElement('div');
    el.className='pslot'+(p?' on':'');
    if(p){el.style.cssText=`background:${COLORS[i]}15;border-color:${COLORS[i]};color:${COLORS[i]};box-shadow:0 0 12px ${COLORS[i]}44;`;el.innerHTML=`<div style="font-size:22px">●</div><div style="font-size:10px;font-weight:700">${p.name}</div>`;}
    else el.innerHTML=`<div style="font-size:22px;opacity:.18">○</div><div>Empty</div>`;
    g.appendChild(el);
  }
  const n=gs.players.filter(Boolean).length;
  document.getElementById('lobby-msg').textContent=isHost?(n>1?`${n} players ready!`:'Waiting for friends…'):`${n} player${n!==1?'s':''} in lobby`;
  document.getElementById('startBtn').style.display=isHost&&n>=1?'block':'none';
}

function mkState(){return {players:[null,null,null,null],bullets:[],powerups:[],phase:'lobby',timeLeft:GDUR,winner:null,code:''};}
function mkPlayer(id,name){
  const sp=[{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
  return {id,name,x:sp[id].x,y:sp[id].y,vx:0,vy:0,angle:0,score:0,
    alive:true,rTimer:0,sCD:0,shield:0,speed:0,bigShot:0,chaos:0};
}

function startGame(){
  if(!isHost)return;
  const old=gs.players.map(p=>p?mkPlayer(p.id,p.name):null);
  gs=mkState(); gs.players=old; gs.phase='playing'; gs.timeLeft=GDUR;
  gs.code=document.getElementById('codeDisplay').textContent;
  splats=[]; parts=[]; trails={}; bId=0; pId=0; puTimer=0; netTimer=0;
  bcast(); launchGame();
}

function launchGame(){
  showScreen('_none');
  canvas.classList.remove('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('minimap-c').classList.remove('hidden');
  if(isMobile) document.getElementById('fire-btn').style.display='flex';
  resizeCanvas();
  const me=gs.players[myId];
  if(me){camX=me.x-canvas.width/2; camY=me.y-canvas.height/2;}
  if(rafId)cancelAnimationFrame(rafId);
  
  let lastF=performance.now();
  (function loop(now){
    rafId=requestAnimationFrame(loop);
    const dt=Math.min((now-lastF)/1000,.05); lastF=now;
    const me2=gs&&gs.players[myId];
    if(me2&&gs.phase==='playing'){
      const playerScreenX = me2.x - camX;
      const playerScreenY = me2.y - camY;
      inp.angle=Math.atan2(mouseY-playerScreenY, mouseX-playerScreenX);
      inp.shoot=shootHeld||fireTouchDown;
      if(!isHost&&conns[0])conns[0].send({t:'inp',i:{angle:inp.angle,shoot:inp.shoot}});
    }
    if(isHost) tick(dt);
    updateCamera(dt); updateParts(dt); updateTrails();
    render(); updateHUD(); renderMinimap();
  })(performance.now());
}

/* ═══════════════════════════════════════════════
   GAME ENGINE
═══════════════════════════════════════════════ */
function tick(dt){
  if(!gs||gs.phase!=='playing')return;
  applyInp(0,inp);
  if(botMode) tickBots(dt);
  stepPlayers(dt); stepBullets(dt); stepPowerups(dt);
  gs.timeLeft-=dt; puTimer+=dt*1000;
  if(puTimer>PU_INTERVAL){puTimer=0;spawnPU();}
  if(gs.timeLeft<=0){gs.timeLeft=0;endGame();return;}
  if(!botMode){
    netTimer += dt;
    if(netTimer >= 0.05) { bcast(); netTimer = 0; }
  }
}

const DIFF={
  easy:  {speedMult:0.28, thinkSec:2.2, shootRange:220, aimNoise:1.4, shootChance:0.2},
  medium:{speedMult:0.52, thinkSec:0.9, shootRange:420, aimNoise:0.5,  shootChance:0.6},
  hard:  {speedMult:0.80, thinkSec:0.3, shootRange:700, aimNoise:0.12, shootChance:0.88},
};

function tickBots(dt){
  const D=DIFF[botDiff]||DIFF.medium;
  bots.forEach(bot=>{
    const p=gs.players[bot.id]; if(!p||!p.alive)return;
    bot.thinkTimer-=dt;
    if(bot.thinkTimer<=0){
      bot.thinkTimer=D.thinkSec*(0.75+Math.random()*0.5);
      let target=null, bestD=Infinity;
      gs.players.forEach(en=>{
        if(!en||!en.alive||en.id===bot.id)return;
        const d=dst2(p,en); if(d<bestD){bestD=d;target=en;}
      });
      const inRange=target&&bestD<D.shootRange**2;
      if(inRange){
        const dist=Math.sqrt(bestD);
        const ax=target.x-p.x, ay=target.y-p.y;
        const toA=Math.atan2(ay,ax);
        if(dist<180){ bot.targetX=p.x-ax*0.8; bot.targetY=p.y-ay*0.8; } 
        else {
          const orbit=toA+Math.PI/2*((bot.id%2===0?1:-1));
          bot.targetX=target.x+Math.cos(orbit)*240; bot.targetY=target.y+Math.sin(orbit)*240;
        }
        bot.aimAngle=Math.atan2(ay,ax)+(Math.random()-0.5)*D.aimNoise;
        bot.wantShoot=Math.random()<D.shootChance;
      } else {
        bot.targetX=150+Math.random()*(WW-300); bot.targetY=150+Math.random()*(WH-300);
        bot.aimAngle=Math.atan2(bot.targetY-p.y, bot.targetX-p.x);
        bot.wantShoot=false;
      }
    }
    const moveAngle=Math.atan2(bot.targetY-p.y, bot.targetX-p.x);
    applyBotInp(bot.id,moveAngle,bot.aimAngle||moveAngle,bot.wantShoot||false,D.speedMult);
  });
}

function applyBotInp(pid,moveAngle,aimAngle,shoot,speedMult){
  const p=gs.players[pid]; if(!p||!p.alive)return;
  const spd=PSPD*speedMult*(1+(p.speed>0?.65:0))*(p.chaos>0?-1:1);
  p.vx=lerp(p.vx,Math.cos(moveAngle)*spd,.15);
  p.vy=lerp(p.vy,Math.sin(moveAngle)*spd,.15);
  p.angle=aimAngle;
  if(shoot&&p.sCD<=0){fireBullet(pid,p);p.sCD=SHOOT_CD;}
}

function applyInp(pid,i){
  const p=gs.players[pid]; if(!p||!p.alive)return;
  const spd=PSPD*(1+(p.speed>0?.65:0))*(p.chaos>0?-1:1);
  p.vx=lerp(p.vx,Math.cos(i.angle)*spd,.15);
  p.vy=lerp(p.vy,Math.sin(i.angle)*spd,.15);
  p.angle=i.angle;
  if(i.shoot&&p.sCD<=0){fireBullet(pid,p);p.sCD=SHOOT_CD;}
}

function stepPlayers(dt){
  gs.players.forEach(p=>{
    if(!p)return;
    if(!p.alive){
      p.rTimer-=dt;
      if(p.rTimer<=0){
        const sp=[{x:280,y:280},{x:WW-280,y:WH-280},{x:WW-280,y:280},{x:280,y:WH-280}];
        p.x=sp[p.id].x; p.y=sp[p.id].y; p.vx=p.vy=0; p.alive=true; p.shield=2200;
      }
      return;
    }
    p.x+=p.vx * dt; p.y+=p.vy * dt;
    if(p.x<PRAD){p.x=PRAD;p.vx*=-.3;} if(p.x>WW-PRAD){p.x=WW-PRAD;p.vx*=-.3;}
    if(p.y<PRAD){p.y=PRAD;p.vy*=-.3;} if(p.y>WH-PRAD){p.y=WH-PRAD;p.vy*=-.3;}
    const ms=dt*1000;
    if(p.sCD>0)p.sCD-=ms; if(p.shield>0)p.shield-=ms;
    if(p.speed>0)p.speed-=ms; if(p.bigShot>0)p.bigShot-=ms; if(p.chaos>0)p.chaos-=ms;
  });
}

function fireBullet(pid,p){
  const big=p.bigShot>0;
  gs.bullets.push({
    id:bId++, x:p.x+Math.cos(p.angle)*(PRAD+10), y:p.y+Math.sin(p.angle)*(PRAD+10),
    vx:Math.cos(p.angle)*(big?500:650), vy:Math.sin(p.angle)*(big?500:650),
    pid,big,life:big?2.8:2.2
  });
  if(pid===myId || botMode) playSound('shoot', big?0.6:1.2);
}

function stepBullets(dt){
  gs.bullets=gs.bullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    const r=b.big?BBRAD:BRAD;
    if(b.life<=0||b.x<r||b.x>WW-r||b.y<r||b.y>WH-r){
      addSplat(b.x,b.y,COLORS[b.pid],b.big); boom(b.x,b.y,COLORS[b.pid],b.big?14:7); 
      if(isInView(b.x, b.y)) playSound('splat', b.big?0.7:1);
      return false;
    }
    for(const p of gs.players){
      if(!p||!p.alive||p.id===b.pid)continue;
      if(dst2(b,p)<(PRAD+r)**2){
        addSplat(p.x,p.y,COLORS[b.pid],b.big); boom(p.x,p.y,COLORS[b.pid],b.big?24:12);
        if(p.shield<=0){
          p.alive=false;p.rTimer=3;p.vx=p.vy=0;const s=gs.players[b.pid];if(s)s.score++;
          if(isInView(p.x, p.y)) playSound('death', 1);
        } else {
          p.shield=0; boom(p.x,p.y,'#00FFCC',8);
        }
        if(isInView(p.x, p.y)) playSound('hit', b.big?0.5:1.2);
        return false;
      }
    }
    return true;
  });
}

function isInView(x,y) {
  return x > camX - 100 && x < camX + canvas.width + 100 && y > camY - 100 && y < camY + canvas.height + 100;
}

function spawnPU(){
  gs.powerups.push({id:pId++,x:120+Math.random()*(WW-240),y:120+Math.random()*(WH-240),type:PU_TYPES[Math.random()*PU_TYPES.length|0],life:15});
}
function stepPowerups(dt){
  gs.powerups=gs.powerups.filter(u=>{
    u.life-=dt; if(u.life<=0)return false;
    for(const p of gs.players){
      if(!p||!p.alive)continue;
      if(dst2(p,u)<(PRAD+22)**2){
        applyPU(p,u.type); boom(u.x,u.y,PU_CLR[u.type],18);
        if(p.id === myId || botMode) playSound('powerup', 1);
        return false;
      }
    }
    return true;
  });
}
function applyPU(p,t){
  if(t==='speed')p.speed=5000; else if(t==='big')p.bigShot=6000;
  else if(t==='shield')p.shield=9000;
  else if(t==='chaos')gs.players.forEach(o=>{if(o&&o.id!==p.id)o.chaos=3500;});
  else if(t==='heal')p.shield=5000;
}
function addSplat(x,y,color,big=false){
  splats.push({x,y,color,r:big?42:22,a:Math.random()*6.28,pts:6+Math.random()*5|0});
  if(splats.length>320)splats.shift();
}
function boom(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28,spd=70+Math.random()*300;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color,
      life:.5+Math.random()*.5,max:.7+Math.random()*.4,r:3+Math.random()*7});
  }
}

function endGame(){
  if(!isHost)return;
  const alive=gs.players.filter(Boolean);
  const win=alive.reduce((b,p)=>(!b||p.score>b.score)?p:b,null);
  gs.winner=win?win.id:null; gs.phase='gameover';
  if(!botMode)bcast(); showGO();
}
function showGO(){
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const win=gs.winner!=null?gs.players[gs.winner]:null;
  const el=document.getElementById('go-winner');
  el.textContent=win?`🎉 ${win.name} WINS!`:'🎨 TIE!';
  el.style.cssText=`color:${win?COLORS[win.id]:'#fff'};text-shadow:0 0 36px ${win?COLORS[win.id]:'#fff'};`;
  document.getElementById('go-scores').innerHTML=
    gs.players.filter(Boolean).sort((a,b)=>b.score-a.score)
    .map(p=>`<div class="go-row">
      <div class="go-dot" style="background:${COLORS[p.id]};box-shadow:0 0 8px ${COLORS[p.id]}"></div>
      <span style="color:${COLORS[p.id]}">${p.name}</span>
      <span style="opacity:.6;font-family:'Nunito',sans-serif">${p.score} splats</span>
    </div>`).join('');
  document.getElementById('screen-go').classList.remove('hidden');
}
function playAgain(){
  if(botMode) startBotGame();
  else if(isHost) startGame();
  else { conns[0]&&conns[0].send({t:'restart'}); toast('Waiting for host…'); }
}
function leaveGame(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(peer){peer.destroy();peer=null;}
  conns=[];connMap={};gs=null;isHost=false;botMode=false;myId=0;bots=[];
  splats=[];parts=[];trails={};
  canvas.classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('minimap-c').classList.add('hidden');
  document.getElementById('fire-btn').style.display='none';
  showScreen('screen-home');
}

/* ═══════════════════════════════════════════════
   VISUALS
═══════════════════════════════════════════════ */
function updateCamera(dt){
  const me=gs&&gs.players[myId]; if(!me)return;
  const targetX=me.x+Math.cos(inp.angle)*80-canvas.width/2;
  const targetY=me.y+Math.sin(inp.angle)*80-canvas.height/2;
  const t = 1 - Math.pow(0.001, dt);
  camX=clamp(lerp(camX,targetX,t), 0, WW-canvas.width);
  camY=clamp(lerp(camY,targetY,t), 0, WH-canvas.height);
}
function updateParts(dt){
  parts=parts.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=280*dt;p.vx*=.97;p.life-=dt;return p.life>0;});
}
function updateTrails(){
  if(!gs)return;
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    if(!trails[p.id])trails[p.id]=[];
    trails[p.id].push({x:p.x,y:p.y});
    if(trails[p.id].length>TRAIL_MAX)trails[p.id].shift();
  });
}

function resizeCanvas(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  mm.width=110; mm.height=74;
}
window.addEventListener('resize',resizeCanvas);

function render(){
  if(!gs)return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(Math.round(-camX), Math.round(-camY));
  drawFloor(); drawSplats(); drawPUs(); drawTrails(); drawBullets(); drawPlayers(); drawParticles(); drawBorder();
  ctx.restore();
  drawVignette(W,H);
  const me=gs.players[myId];
  if(me&&!me.alive){
    ctx.fillStyle='rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
    ctx.font=`bold 20px Boogaloo`;
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.textAlign='center';
    ctx.fillText(`💀 SPLATTED! Respawning in ${Math.ceil(me.rTimer)}s…`,W/2,H/2);
  }
}

function drawFloor(){
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,WW,WH);
  ctx.strokeStyle='rgba(120,120,255,.03)'; ctx.lineWidth=1;
  const S=68, w=S*Math.sqrt(3);
  for(let r=-1;r<WH/S*2/3+3;r++){
    for(let c=-1;c<WW/w+3;c++){
      const cx=(c+(r%2)*.5)*w, cy=r*(S*1.5);
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;ctx.lineTo(cx+S*Math.cos(a),cy+S*Math.sin(a));}
      ctx.closePath(); ctx.stroke();
    }
  }
}

function drawBorder(){
  ctx.strokeStyle='rgba(255,60,160,.5)'; ctx.lineWidth=5;
  ctx.strokeRect(3,3,WW-6,WH-6);
}

function drawSplats(){
  splats.forEach(sp=>{
    ctx.save(); ctx.translate(sp.x,sp.y); ctx.rotate(sp.a);
    ctx.globalAlpha=.48; ctx.fillStyle=sp.color;
    ctx.beginPath();
    for(let i=0;i<sp.pts*2;i++){
      const a=(i/(sp.pts*2))*Math.PI*2, r=i%2===0?sp.r:sp.r*.5;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawTrails(){
  Object.entries(trails).forEach(([id,trail])=>{
    if(!trail||trail.length<2)return;
    const col=COLORS[+id];
    for(let i=1;i<trail.length;i++){
      ctx.globalAlpha=(i/trail.length)*.28; ctx.strokeStyle=col;
      ctx.lineWidth=(i/trail.length)*PRAD*.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(trail[i-1].x,trail[i-1].y); ctx.lineTo(trail[i].x,trail[i].y);
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
}

function drawPlayers(){
  const now=Date.now();
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    const col=COLORS[p.id];
    ctx.globalAlpha = (p.shield>0 && Math.floor(now/120)%2===0) ? 0.38 : 1;
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor=col; ctx.shadowBlur=20; ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(0,0,PRAD,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.rotate(p.angle);
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(8, -7, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, 7, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(10, -7, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 7, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.font='bold 13px Boogaloo'; ctx.textAlign='center'; ctx.fillStyle='white';
    ctx.fillText(p.name, p.x, p.y-PRAD-10);
  });
  ctx.globalAlpha=1;
}

function drawBullets(){
  gs.bullets.forEach(b=>{
    const col=COLORS[b.pid], r=b.big?BBRAD:BRAD;
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });
}

function drawPUs(){
  const now=Date.now();
  gs.powerups.forEach(u=>{
    const col=PU_CLR[u.type], pulse=1+Math.sin(now*.004)*.13;
    ctx.save(); ctx.translate(u.x,u.y);
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(0,0,22*pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='white'; ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(PU_ICO[u.type],0,0);
    ctx.restore();
  });
}

function drawParticles(){
  parts.forEach(p=>{
    ctx.globalAlpha=p.life/p.max; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawVignette(W,H){
  const vg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.9);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function updateHUD(){
  if(!gs||gs.phase!=='playing')return;
  const t=Math.ceil(gs.timeLeft),m=t/60|0,s2=t%60;
  document.getElementById('timer').textContent=`${m}:${(''+s2).padStart(2,'0')}`;
  document.getElementById('hud-scores').innerHTML=
    gs.players.filter(Boolean).sort((a,b)=>b.score-a.score).map(p=>`
      <div class="hs" style="border-left-color:${COLORS[p.id]}">
        <span style="color:${COLORS[p.id]}">${p.name}</span> <b>${p.score}</b>
      </div>`).join('');
}

function renderMinimap(){
  if(!gs||gs.phase!=='playing')return;
  const W=mm.width,H=mm.height,sx=W/WW,sy=H/WH;
  mmc.fillStyle='rgba(4,4,20,.8)'; mmc.fillRect(0,0,W,H);
  gs.players.forEach(p=>{
    if(!p||!p.alive)return;
    mmc.fillStyle=COLORS[p.id]; mmc.beginPath(); mmc.arc(p.x*sx,p.y*sy,p.id===myId?4:2.5,0,Math.PI*2); mmc.fill();
  });
}

/* ═══════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════ */
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mousedown',e=>{if(e.button===0)shootHeld=true;});
canvas.addEventListener('mouseup',e=>{if(e.button===0)shootHeld=false;});
window.addEventListener('mouseup',e=>{if(e.button===0)shootHeld=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

isMobile=/Mobi|Android|iPhone|iPad|Touch/i.test(navigator.userAgent)||navigator.maxTouchPoints>1;
const fireBtn=document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart',e=>{e.preventDefault();fireTouchDown=true;},{passive:false});
fireBtn.addEventListener('touchend',e=>{e.preventDefault();fireTouchDown=false;},{passive:false});

let steerTid=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{ if(steerTid===null){steerTid=t.identifier;mouseX=t.clientX;mouseY=t.clientY;} });
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{ if(t.identifier===steerTid){mouseX=t.clientX;mouseY=t.clientY;} });
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault(); Array.from(e.changedTouches).forEach(t=>{if(t.identifier===steerTid)steerTid=null;});
},{passive:false});

resizeCanvas();
showScreen('screen-home');
setDiff('medium');
setBotCount(1);
</script>
</body>
</html>

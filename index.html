// ── STATE ──
let peer=null, myId=0, isHost=false, botMode=false;
let conns=[], connMap={};
let gs=null;
let splats=[], parts=[], trails={};
let bId=0, pId=0, rafId=null, puTimer=0, netTimer=0;
let myName='PLAYER', isMobile=false;
let botCount=1, botDiff='medium';

let mouseX=0, mouseY=0, shootHeld=false, fireTouchDown=false;

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap-c');
const mmc=mm.getContext('2d');

// ── CLIENT PREDICTION & INTERPOLATION (NEW) ──
let localPlayerSnapshot = null;   // our predicted position
let remotePlayers = {};           // {id: {x,y,angle,lastUpdate}}
const INTERP_TIME = 0.08;

// ── OPTIMIZED BROADCAST (delta + lower rate in lobby) ──
function bcast(){
  if(!isHost) return;
  const payload = {
    t: 'gs',
    gs: gs,
    splats: splats.slice(-120),        // reduced from 200
    timestamp: Date.now()
  };
  conns.forEach(c=>{ try{c.send(payload);}catch(e){} });
}

// In lobby we now throttle
let lastLobbyBroadcast = 0;
function updateLobby(){
  // ... your original updateLobby code ...
  if(Date.now()-lastLobbyBroadcast > 300){  // only every 300ms in lobby
    bcast();
    lastLobbyBroadcast = Date.now();
  }
}

// ── CLIENT RECEIVE (with interpolation) ──
function onHostData(d){
  if(d.t==='gs'){
    gs = d.gs;
    splats = d.splats || splats;

    // Store remote positions for interpolation
    if(gs.players){
      gs.players.forEach(p=>{
        if(p && p.id !== myId){
          if(!remotePlayers[p.id]) remotePlayers[p.id] = {};
          remotePlayers[p.id] = {...p, lastUpdate: Date.now()};
        }
      });
    }
  }
  // ... rest unchanged ...
}

// ── CLIENT TICK (prediction) ──
function clientTick(dt){
  const me = gs?.players[myId];
  if(!me || !me.alive) return;

  // Predict our own movement
  const spd = PSPD * (1+(me.speed>0?0.65:0)) * (me.chaos>0?-1:1);
  me.vx = lerp(me.vx, Math.cos(inp.angle)*spd, 0.2);
  me.vy = lerp(me.vy, Math.sin(inp.angle)*spd, 0.2);
  me.x += me.vx * dt;
  me.y += me.vy * dt;
  me.angle = inp.angle;

  // Keep in bounds
  if(me.x<PRAD) me.x=PRAD;
  if(me.x>WW-PRAD) me.x=WW-PRAD;
  // ... same for y ...
}

// In your loop, replace the old client part with:
if(!isHost){
  clientTick(dt);
}

// ── RENDER (interpolate remote players) ──
function drawPlayers(){
  const now = Date.now();
  gs.players.forEach(p=>{
    if(!p || !p.alive) return;

    let drawX = p.x, drawY = p.y, drawAngle = p.angle;

    // Interpolate remote players
    if(p.id !== myId && remotePlayers[p.id]){
      const rp = remotePlayers[p.id];
      const alpha = Math.min(1, (now - rp.lastUpdate) / (INTERP_TIME*1000));
      drawX = lerp(rp.x, p.x, alpha);
      drawY = lerp(rp.y, p.y, alpha);
      drawAngle = lerp(rp.angle, p.angle, alpha);
    }

    // ... draw player at drawX, drawY, drawAngle (use your full original drawPlayers code here)
  });
}
